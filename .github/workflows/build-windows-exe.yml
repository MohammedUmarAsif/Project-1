name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: ["**"]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Package zip
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item "build/Release/midnight_prototype.exe" "dist/midnight_prototype.exe"
          Compress-Archive -Path dist/* -DestinationPath midnight_prototype_win.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: midnight_prototype_win
          path: midnight_prototype_win.zip
